    name: Snipcart REST API
    description: >
      The Snipcart REST API provides programmatic access to your store's data including
      orders, customers, products, discounts, notifications, abandoned carts, domains,
      refunds, user sessions, and custom shipping methods. It uses HTTP Basic Auth with
      a secret API key and accepts only application/json content type.
