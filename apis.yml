aid: snipcart
name: Snipcart
description: >
  Snipcart is a developer-first shopping cart platform that enables merchants to add
  fully functional e-commerce to any website by embedding a JavaScript snippet. It
  provides a REST API accessible at https://app.snipcart.com/api for managing orders,
  customers, products, discounts, notifications, abandoned carts, and custom shipping
  methods. Authentication uses HTTP Basic Auth with a secret API key generated from the
  merchant dashboard, and the platform supports webhooks for real-time event notifications
  on orders, subscriptions, shipping, and taxes. Snipcart is stack-agnostic and integrates
  with static site generators, headless CMSs, and modern JavaScript frameworks.
